version: "3.9"

services:
  app:
    image: ghcr.io/ubuntu/statuspulse:latest
    container_name: statuspulse_app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    networks:
      - statuspulse_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

  db:
    image: postgres:15
    container_name: statuspulse_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - statuspulse_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 30s
      retries: 3

  redis:
    image: redis:7
    container_name: statuspulse_redis
    networks:
      - statuspulse_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      retries: 3

volumes:
  pgdata:

networks:
  statuspulse_net:
    driver: bridge
