name: Deploy Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: ci   # 🔥 IMPORTANT

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- LOGIN ----------------
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # ---------------- BUILD ----------------
      - name: Build image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t $IMAGE:${{ github.sha }} .
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest

      # ---------------- PUSH ----------------
      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # ---------------- DEPLOY ----------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/statuspulse

            PREVIOUS=$(docker images ghcr.io/${{ github.repository }} --format "{{.Tag}}" | head -n 2 | tail -n 1)

            docker pull ghcr.io/${{ github.repository }}:latest
            docker compose up -d

            sleep 15

            if curl -f http://localhost:8000/health; then
              echo "Deployment successful"
            else
              echo "Health failed → rollback"
              docker pull ghcr.io/${{ github.repository }}:$PREVIOUS
              docker compose down
              docker compose up -d
              exit 1
            fi

      # ---------------- NOTIFICATIONS ----------------
      - name: Notify success
        if: success()
        run: curl -H "Content-Type: application/json" \
          -d '{"content": "✅ Deployment SUCCESS"}' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notify failure
        if: failure()
        run: curl -H "Content-Type: application/json" \
          -d '{"content": "❌ Deployment FAILED"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
