name: Deploy Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image
        run: echo "IMAGE=ghcr.io/kedarsuru/statuspulse" >> $GITHUB_ENV

      - name: Build image
        run: |
          docker build -t $IMAGE:${{ github.sha }} .
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest

      - name: Push image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd ~/statuspulse

            echo "Pulling image..."
            docker pull ghcr.io/kedarsuru/statuspulse:latest

            echo "Restarting..."
            docker compose down || true
            docker compose up -d

            echo "Health check..."
            curl -f http://localhost:8000/health

            echo "DEPLOY SUCCESS"
