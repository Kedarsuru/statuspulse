name: Deploy Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- LOGIN GHCR ----------------
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # ---------------- BUILD ----------------
      - name: Build image
        run: |
          IMAGE=ghcr.io/kedarsuru/statuspulse
          docker build -t $IMAGE:${{ github.sha }} .
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest

      # ---------------- PUSH ----------------
      - name: Push image
        run: |
          IMAGE=ghcr.io/kedarsuru/statuspulse
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # ---------------- DEPLOY ----------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/statuspulse

            IMAGE=ghcr.io/kedarsuru/statuspulse

            # Pull latest image
            docker pull $IMAGE:latest

            # Backup current container (for rollback)
            docker tag $IMAGE:latest statuspulse:backup || true

            # Deploy new version
            docker compose down
            docker compose up -d

            sleep 15

            # Health check
            if curl -f http://localhost:8000/health; then
              echo "Deployment SUCCESS"
            else
              echo "FAILED → Rolling back"

              docker tag statuspulse:backup $IMAGE:latest
              docker compose down
              docker compose up -d
              exit 1
            fi

      # ---------------- NOTIFICATIONS ----------------
      - name: Notify success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "✅ Deployment SUCCESS"}' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notify failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "❌ Deployment FAILED"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
