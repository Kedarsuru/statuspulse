name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write   # IMPORTANT for GHCR

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- PYTHON SETUP ----------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff

      # FIXED RUFF (your error was wrong command)
      - name: Lint Python code
        run: ruff check app/

      # ---------------- DOCKER LINT ----------------
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # ---------------- BUILD IMAGE ----------------
      - name: Build Docker image
        run: docker build -t statuspulse:test .

      # ---------------- START STACK ----------------
      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 25

      # ---------------- TESTS ----------------
      - name: Run integration tests
        run: bash tests/test_integration.sh | tee test_output.txt

      # ---------------- ARTIFACT ----------------
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_output.txt

      # ---------------- CLEANUP ----------------
      - name: Shutdown stack
        if: always()
        run: docker compose down -v
