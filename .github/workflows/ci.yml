name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- PYTHON ----------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install ruff

      - name: Lint Python
        run: ruff check app/

      # ---------------- DOCKER LINT ----------------
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # ---------------- BUILD ----------------
      - name: Build image
        run: docker build -t statuspulse:test .

      # ---------------- RUN STACK ----------------
      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 30

      # ---------------- TEST ----------------
      - name: Run tests
        run: bash tests/test_integration.sh | tee test_output.txt

      # ---------------- ARTIFACT ----------------
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_output.txt

      # ---------------- CLEAN ----------------
      - name: Shutdown
        if: always()
        run: docker compose down -v
