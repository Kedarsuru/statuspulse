name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- PYTHON ----------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff fastapi uvicorn psycopg2-binary redis

      # ---------------- LINT ----------------
      - name: Run Ruff Lint
        run: ruff check app/

      # ---------------- DOCKER LINT ----------------
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
        continue-on-error: true   # prevents CI red for minor warnings

      # ---------------- BUILD ----------------
      - name: Build Docker image
        run: docker build -t statuspulse:test .

      # ---------------- RUN APP (NO COMPOSE) ----------------
      - name: Run container
        run: |
          docker run -d \
            -p 8000:8000 \
            --name statuspulse_app \
            statuspulse:test

      - name: Wait for app
        run: sleep 15

      # ---------------- TEST ----------------
      - name: Run integration tests
        run: bash tests/test_integration.sh | tee test_output.txt

      # ---------------- UPLOAD ARTIFACT ----------------
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_output.txt

      # ---------------- CLEANUP ----------------
      - name: Stop container
        if: always()
        run: docker rm -f statuspulse_app || true
